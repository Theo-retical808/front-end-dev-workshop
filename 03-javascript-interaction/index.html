<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 3: JavaScript Interaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 
        🎓 MODULE 3: JAVASCRIPT INTERACTION
        ====================================
        
        JavaScript makes your page INTERACTIVE!
        HTML = what's on the page
        CSS = how it looks
        JavaScript = what it DOES
        
        JavaScript can:
        - Respond to clicks
        - Change text and styles
        - Show/hide things
        - Do math and logic
        - And so much more!
    -->

    <h1>JavaScript is Magic! 🪄</h1>

    <!-- EXAMPLE 1: Click counter -->
    <div class="demo-box">
        <h2>🔢 Click Counter</h2>
        <p>You've clicked <span id="count">0</span> times!</p>
        <button id="count-button">Click Me!</button>
    </div>

    <!-- EXAMPLE 2: Change text -->
    <div class="demo-box">
        <h2>✏️ Text Changer</h2>
        <p id="changing-text">This text will change when you click the button!</p>
        <button id="text-button">Change Text</button>
    </div>

    <!-- EXAMPLE 3: Color changer -->
    <div class="demo-box">
        <h2>🎨 Color Changer</h2>
        <div id="color-box" class="color-box">My color changes!</div>
        <button id="color-button">Random Color!</button>
    </div>

    <!-- EXAMPLE 4: Toggle visibility -->
    <div class="demo-box">
        <h2>👻 Now You See Me...</h2>
        <p id="hidden-message" class="hidden-message">BOO! 👻 You found me!</p>
        <button id="toggle-button">Show/Hide Message</button>
    </div>

    <!-- EXAMPLE 5: Simple calculator -->
    <div class="demo-box">
        <h2>🧮 Mini Calculator</h2>
        <input type="number" id="num1" placeholder="Number 1" class="calc-input">
        <input type="number" id="num2" placeholder="Number 2" class="calc-input">
        <button id="add-button">Add Them!</button>
        <p>Result: <span id="result">?</span></p>
    </div>

    <!-- EXAMPLE 6: Name greeter -->
    <div class="demo-box">
        <h2>👋 Personal Greeter</h2>
        <input type="text" id="name-input" placeholder="Type your name..." class="calc-input">
        <button id="greet-button">Greet Me!</button>
        <p id="greeting"></p>
    </div>

    <!-- Link to our JavaScript file (always put this at the bottom!) -->
    <script src="script.js"></script>

    <!-- 
        ✅ EXERCISES:
        1. Make the counter go DOWN with a second button
        2. Add more messages to the text changer
        3. Make the greeting say something different based on the time of day
        4. Add a "multiply" button to the calculator
        5. Create a new demo box that changes the background of the whole page
    -->

</body>
</html>
